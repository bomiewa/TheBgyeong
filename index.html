<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>펜션 업무 관리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.wrap{max-width:720px;margin:0 auto;padding:1.5rem 1rem 4rem}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
.app-title{font-size:20px;font-weight:600;color:#1a1a1a}
.date-label{font-size:13px;color:#888;margin-top:2px}
.tabs{display:flex;gap:4px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{padding:7px 16px;font-size:13px;border-radius:20px;border:1px solid #ddd;cursor:pointer;background:#fff;color:#666;transition:all .15s}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:500}
.section-title{font-size:11px;font-weight:600;color:#999;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.task-card{background:#fff;border:1px solid #e8e8e6;border-radius:12px;margin-bottom:8px;overflow:hidden}
.task-header{display:flex;align-items:center;gap:10px;padding:12px 14px}
.task-title{flex:1;font-size:14px;font-weight:500;color:#1a1a1a}
.task-meta{font-size:11px;color:#999}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.badge-repeat{background:#e6f1fb;color:#185fa5}
.badge-once{background:#f1efe8;color:#5f5e5a}
.badge-urgent{background:#fcebeb;color:#a32d2d}
.locations{padding:0 14px 12px;display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.loc-btn{border:1px solid #e0e0de;border-radius:8px;padding:10px 6px;text-align:center;cursor:pointer;background:#fff;transition:all .15s;user-select:none}
.loc-btn:hover{background:#f5f5f3}
.loc-btn.doing{border-color:#378add;background:#e6f1fb}
.loc-btn.done{border-color:#3b6d11;background:#eaf3de}
.loc-name{font-size:13px;font-weight:500;color:#1a1a1a;display:block;margin-bottom:4px}
.loc-status{font-size:10px;color:#999}
.loc-btn.doing .loc-name,.loc-btn.doing .loc-status{color:#185fa5}
.loc-btn.done .loc-name,.loc-btn.done .loc-status{color:#3b6d11}
.progress-bar{height:3px;background:#f0f0ee;margin:0 14px 8px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#3b6d11;border-radius:2px;transition:width .3s}
.pct-label{padding:0 14px 8px;font-size:11px;color:#999}
.empty{text-align:center;padding:3rem 1rem;color:#999;font-size:14px}
.empty i{font-size:36px;display:block;margin-bottom:10px}
.add-form{background:#fff;border:1px solid #e8e8e6;border-radius:12px;padding:16px;margin-bottom:1rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
input,select{width:100%;padding:8px 10px;font-size:13px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;outline:none}
input:focus,select:focus{border-color:#888}
.loc-checks{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.loc-check{display:flex;align-items:center;gap:5px;font-size:13px;color:#1a1a1a;cursor:pointer}
.loc-check input[type=checkbox]{width:auto;width:15px;height:15px}
.btn{padding:8px 16px;font-size:13px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;cursor:pointer;font-weight:500}
.btn:hover{background:#f5f5f3}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.sum-card{background:#fff;border:1px solid #e8e8e6;border-radius:10px;padding:14px;text-align:center}
.sum-num{font-size:26px;font-weight:600;color:#1a1a1a}
.sum-label{font-size:11px;color:#999;margin-top:3px}
.history-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f0f0ee;font-size:13px}
.history-item:last-child{border-bottom:none}
.hi-date{color:#999;min-width:64px;font-size:12px}
.hi-task{flex:1;color:#1a1a1a}
.hi-loc{font-size:11px;color:#999;background:#f5f5f3;padding:2px 8px;border-radius:10px}
.all-done-banner{background:#eaf3de;border:1px solid #c0dd97;border-radius:12px;padding:1.5rem;text-align:center;color:#3b6d11;font-size:14px;font-weight:500;margin-bottom:1rem}
.due-badge{font-size:10px;color:#185fa5;background:#e6f1fb;padding:2px 7px;border-radius:10px;margin-left:6px}
.del-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:15px;padding:3px;line-height:1}
.del-btn:hover{color:#e24b4a}
@media(max-width:480px){
  .locations{grid-template-columns:repeat(2,1fr)}
  .form-row{grid-template-columns:1fr}
  .summary-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <div>
      <div class="app-title"><i class="ti ti-building-cottage" style="font-size:18px;vertical-align:-2px;margin-right:4px"></i>펜션 업무 관리</div>
      <div class="date-label" id="date-label"></div>
    </div>
    <button class="btn btn-primary" onclick="toggleForm()"><i class="ti ti-plus"></i> 새 태스크</button>
  </div>

  <div id="add-form" style="display:none" class="add-form">
    <div style="font-size:14px;font-weight:500;margin-bottom:12px;color:#1a1a1a">새 태스크 추가</div>
    <div class="form-row">
      <input id="f-title" placeholder="태스크 이름 (예: 그릴 닦기)">
      <select id="f-cat">
        <option value="딥클린">딥클린</option>
        <option value="보수">보수</option>
        <option value="점검">점검</option>
        <option value="기타">기타</option>
      </select>
    </div>
    <div class="form-row">
      <select id="f-repeat">
        <option value="0">반복 없음 (일회성)</option>
        <option value="7">매주 반복</option>
        <option value="14">2주마다 반복</option>
        <option value="21">3주마다 반복</option>
        <option value="30">매월 반복</option>
      </select>
      <select id="f-priority">
        <option value="일반">일반</option>
        <option value="긴급">긴급</option>
      </select>
    </div>
    <div style="font-size:12px;color:#999;margin-bottom:6px">담당 장소 선택</div>
    <div class="loc-checks">
      <label class="loc-check"><input type="checkbox" value="구름" checked> 구름</label>
      <label class="loc-check"><input type="checkbox" value="바람" checked> 바람</label>
      <label class="loc-check"><input type="checkbox" value="강" checked> 강</label>
      <label class="loc-check"><input type="checkbox" value="초원" checked> 초원</label>
      <label class="loc-check"><input type="checkbox" value="달" checked> 달</label>
      <label class="loc-check"><input type="checkbox" value="하늘" checked> 하늘</label>
      <label class="loc-check"><input type="checkbox" value="별" checked> 별</label>
      <label class="loc-check"><input type="checkbox" value="아침" checked> 아침</label>
      <label class="loc-check"><input type="checkbox" value="숲" checked> 숲</label>
      <label class="loc-check"><input type="checkbox" value="노을" checked> 노을</label>
      <label class="loc-check"><input type="checkbox" value="이슬" checked> 이슬</label>
      <label class="loc-check"><input type="checkbox" value="풀잎" checked> 풀잎</label>
    </div>
    <input id="f-memo" placeholder="메모 (선택)" style="margin-bottom:10px">
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="addTask()">추가하기</button>
      <button class="btn" onclick="toggleForm()">취소</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('today',this)"><i class="ti ti-sun" style="font-size:13px;vertical-align:-1px"></i> 오늘 할 일</button>
    <button class="tab" onclick="switchTab('all',this)"><i class="ti ti-list" style="font-size:13px;vertical-align:-1px"></i> 전체 태스크</button>
    <button class="tab" onclick="switchTab('history',this)"><i class="ti ti-history" style="font-size:13px;vertical-align:-1px"></i> 완료 기록</button>
  </div>

  <div id="tab-today"></div>
  <div id="tab-all" style="display:none"></div>
  <div id="tab-history" style="display:none"></div>
</div>

<script>
const LOCS=['구름','바람','강','초원','달','하늘','별','아침','숲','노을','이슬','풀잎'];
const today=new Date();
const todayStr=today.toISOString().split('T')[0];
document.getElementById('date-label').textContent=today.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

let tasks=JSON.parse(localStorage.getItem('pension_tasks')||'[]');
let history=JSON.parse(localStorage.getItem('pension_history')||'[]');

if(tasks.length===0){
  tasks=[
    {id:1,title:'그릴 닦기',cat:'딥클린',repeat:14,priority:'일반',locs:['구름','바람','강','초원','달','하늘','별','아침','숲','노을','이슬','풀잎'],memo:'',createdAt:todayStr,nextDue:todayStr,locStatus:{}},
    {id:2,title:'에어컨 필터 청소',cat:'점검',repeat:21,priority:'일반',locs:['구름','바람','강','초원','달','하늘','별','아침','숲','노을','이슬','풀잎'],memo:'',createdAt:todayStr,nextDue:todayStr,locStatus:{}},
    {id:3,title:'욕실 줄눈 보수',cat:'보수',repeat:0,priority:'긴급',locs:['강'],memo:'강 빌라 2층',createdAt:todayStr,nextDue:todayStr,locStatus:{}},
    {id:4,title:'마당 잡초 제거',cat:'기타',repeat:14,priority:'일반',locs:['구름','초원'],memo:'',createdAt:todayStr,nextDue:todayStr,locStatus:{}},
  ];
  save();
}

function save(){
  localStorage.setItem('pension_tasks',JSON.stringify(tasks));
  localStorage.setItem('pension_history',JSON.stringify(history));
}

function getLocState(task,loc){return(task.locStatus&&task.locStatus[loc])||'idle';}

function cycleLocState(taskId,loc){
  const t=tasks.find(x=>x.id===taskId);
  if(!t)return;
  if(!t.locStatus)t.locStatus={};
  const cur=t.locStatus[loc]||'idle';
  const next=cur==='idle'?'doing':cur==='doing'?'done':'idle';
  t.locStatus[loc]=next;
  if(next==='done'){
    history.unshift({date:todayStr,taskTitle:t.title,loc,cat:t.cat});
    if(history.length>300)history=history.slice(0,300);
  }
  const allDone=t.locs.every(l=>t.locStatus[l]==='done');
  if(allDone&&t.locs.length>0){
    if(t.repeat>0){
      const d=new Date(todayStr);
      d.setDate(d.getDate()+t.repeat);
      t.nextDue=d.toISOString().split('T')[0];
      t.locStatus={};
    } else {
      tasks=tasks.filter(x=>x.id!==taskId);
    }
  }
  save();render();
}

function locLabel(s){return s==='doing'?'진행 중':s==='done'?'완료':'대기';}
function locIcon(s){return s==='done'?'ti-check':s==='doing'?'ti-clock':'ti-circle';}

function renderTaskCard(t){
  const states=t.locs.map(l=>getLocState(t,l));
  const doneCount=states.filter(s=>s==='done').length;
  const allDone=doneCount===t.locs.length&&t.locs.length>0;
  const pct=t.locs.length?Math.round(doneCount/t.locs.length*100):0;
  const badgeClass=t.priority==='긴급'?'badge-urgent':t.repeat>0?'badge-repeat':'badge-once';
  const badgeText=t.priority==='긴급'?'긴급':t.repeat>0?(t.repeat===7?'매주':t.repeat===14?'2주 반복':t.repeat===21?'3주 반복':'매월'):'일회성';
  const locBtns=t.locs.map(loc=>{
    const st=getLocState(t,loc);
    return `<div class="loc-btn ${st}" onclick="cycleLocState(${t.id},'${loc}')">
      <i class="ti ${locIcon(st)}" style="font-size:15px;margin-bottom:3px;display:block"></i>
      <span class="loc-name">${loc}</span>
      <span class="loc-status">${locLabel(st)}</span>
    </div>`;
  }).join('');
  return `<div class="task-card" style="${allDone?'opacity:.45':''}">
    <div class="task-header">
      <i class="ti ti-clipboard-list" style="font-size:16px;color:#bbb"></i>
      <span class="task-title">${t.title}${t.memo?` <span style="font-size:11px;color:#bbb;font-weight:400">${t.memo}</span>`:''}</span>
      <span class="badge ${badgeClass}">${badgeText}</span>
      <span class="task-meta">${t.cat}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="pct-label">${doneCount}/${t.locs.length} 완료 (${pct}%)</div>
    <div class="locations">${locBtns}</div>
  </div>`;
}

function renderToday(){
  const tt=tasks.filter(t=>t.nextDue<=todayStr);
  const undone=tt.filter(t=>!t.locs.every(l=>getLocState(t,l)==='done'));
  const doneCount=tt.length-undone.length;
  let html=`<div class="summary-grid">
    <div class="sum-card"><div class="sum-num">${tt.length}</div><div class="sum-label">오늘 태스크</div></div>
    <div class="sum-card"><div class="sum-num" style="color:#3b6d11">${doneCount}</div><div class="sum-label">완료</div></div>
    <div class="sum-card"><div class="sum-num" style="color:#185fa5">${undone.length}</div><div class="sum-label">남은 태스크</div></div>
  </div>`;
  if(tt.length===0){
    html+=`<div class="empty"><i class="ti ti-sun"></i>오늘 예정된 태스크가 없어요</div>`;
  } else if(undone.length===0){
    html+=`<div class="all-done-banner"><i class="ti ti-circle-check" style="font-size:24px;display:block;margin-bottom:6px"></i>오늘 할 일을 모두 완료했어요! 🎉</div>`;
    html+=tt.map(t=>renderTaskCard(t)).join('');
  } else {
    html+=`<div class="section-title">진행 중 (${undone.length})</div>`;
    html+=undone.map(t=>renderTaskCard(t)).join('');
    if(doneCount>0){
      html+=`<div class="section-title" style="margin-top:1rem">완료 (${doneCount})</div>`;
      html+=tt.filter(t=>t.locs.every(l=>getLocState(t,l)==='done')).map(t=>renderTaskCard(t)).join('');
    }
  }
  document.getElementById('tab-today').innerHTML=html;
}

function renderAll(){
  let html=`<div class="section-title">전체 태스크 (${tasks.length})</div>`;
  if(tasks.length===0){html+=`<div class="empty"><i class="ti ti-clipboard"></i>등록된 태스크가 없어요</div>`;}
  else {
    html+=`<div style="background:#fff;border:1px solid #e8e8e6;border-radius:12px;overflow:hidden">`;
    html+=tasks.map(t=>{
      const due=t.nextDue>todayStr?`<span class="due-badge"><i class="ti ti-calendar" style="font-size:10px"></i> ${t.nextDue}</span>`:'';
      const badgeClass=t.priority==='긴급'?'badge-urgent':t.repeat>0?'badge-repeat':'badge-once';
      const badgeText=t.priority==='긴급'?'긴급':t.repeat>0?(t.repeat===7?'매주':t.repeat===14?'2주':t.repeat===21?'3주':'매월'):'일회성';
      return `<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f0f0ee">
        <i class="ti ti-clipboard-list" style="font-size:15px;color:#bbb;flex-shrink:0"></i>
        <span style="flex:1;font-size:14px;font-weight:500">${t.title}${due}</span>
        <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;align-items:center">
          ${t.locs.map(l=>`<span style="font-size:10px;background:#f5f5f3;border-radius:8px;padding:2px 7px;color:#666">${l}</span>`).join('')}
          <span class="badge ${badgeClass}">${badgeText}</span>
          <button class="del-btn" onclick="deleteTask(${t.id})"><i class="ti ti-trash"></i></button>
        </div>
      </div>`;
    }).join('');
    html+=`</div>`;
  }
  document.getElementById('tab-all').innerHTML=html;
}

function renderHistory(){
  let html=`<div class="section-title">완료 기록 (${Math.min(history.length,100)}건)</div>`;
  if(history.length===0){html+=`<div class="empty"><i class="ti ti-history"></i>완료 기록이 없어요</div>`;}
  else {
    html+=`<div style="background:#fff;border:1px solid #e8e8e6;border-radius:12px;overflow:hidden">`;
    html+=history.slice(0,100).map(h=>`<div class="history-item">
      <span class="hi-date">${h.date}</span>
      <span class="hi-task">${h.taskTitle}</span>
      <span class="hi-loc">${h.loc}</span>
      <span class="badge badge-once">${h.cat}</span>
    </div>`).join('');
    html+=`</div>`;
  }
  document.getElementById('tab-history').innerHTML=html;
}

function render(){renderToday();renderAll();renderHistory();}

function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['today','all','history'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'block':'none';
  });
}

function toggleForm(){
  const f=document.getElementById('add-form');
  f.style.display=f.style.display==='none'?'block':'none';
}

function addTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){alert('태스크 이름을 입력해주세요');return;}
  const locs=[...document.querySelectorAll('.loc-checks input:checked')].map(x=>x.value);
  if(locs.length===0){alert('장소를 최소 1개 선택해주세요');return;}
  tasks.push({
    id:Date.now(),title,
    cat:document.getElementById('f-cat').value,
    repeat:parseInt(document.getElementById('f-repeat').value),
    priority:document.getElementById('f-priority').value,
    locs,memo:document.getElementById('f-memo').value.trim(),
    createdAt:todayStr,nextDue:todayStr,locStatus:{}
  });
  save();render();
  document.getElementById('f-title').value='';
  document.getElementById('f-memo').value='';
  toggleForm();
}

function deleteTask(id){
  if(!confirm('이 태스크를 삭제할까요?'))return;
  tasks=tasks.filter(t=>t.id!==id);
  save();render();
}

render();
</script>
</body>
</html>
